<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PriceCompare</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="loading" id="loading">

    <div class="loading-spinner"></div>

    <div class="loading-text">
        Loading Live Prices...
    </div>

    <div class="loading-sub">
        Comparing Amazon & Flipkart instantly
    </div>

</div>

<div class="container">

<header>

<div class="logo">
Price<span>Compare</span>
</div>

<div class="subtitle">
Compare live prices across Amazon & Flipkart instantly
</div>

<div class="search-box">

<input
id="searchInput"
type="text"
placeholder="Search mobiles, laptops, tablets..."
>

<button onclick="searchProducts()">
Search
</button>

</div>

</header>

<div id="homePage">

<div class="section-title">
Popular Mobiles
</div>

<div class="products-grid" id="mobilesGrid"></div>

<div class="section-title">
Popular Laptops
</div>

<div class="products-grid" id="laptopsGrid"></div>

<div class="section-title">
Popular Tablets
</div>

<div class="products-grid" id="tabletsGrid"></div>

</div>

<div class="details-page" id="detailsPage">

<button class="back-btn" onclick="goBack()">
← Back
</button>

<div class="details-top">

<div class="details-image">

<img id="detailsImage">

</div>

<div>

<div class="details-title" id="detailsTitle"></div>

<div class="best-box">

<div class="best-label">
Best Price
</div>

<div class="best-price" id="bestPrice"></div>

<div class="best-deal" id="bestDeal"></div>

</div>

</div>

</div>

<table class="compare-table">

<thead>

<tr>
<th>Platform</th>
<th>Price</th>
<th>Action</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<script src="app.js"></script>
